<!DOCTYPE html>
<html>
<head>
    <title>CampusGuard - AI Detection</title>

    <link rel="stylesheet" href="style.css">

    <!-- 🔥 Better font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="card">

    <h1>🎙️ CampusGuard</h1>
    <p class="subtitle">AI-Powered Abusive Speech Detection</p>

    <div class="upload">
        <input type="file" id="audioInput" accept="audio/*">
        <button onclick="uploadAudio()">Analyze</button>
    </div>

    <p id="loading" class="loading">⏳ Processing audio...</p>

    <div class="result">
        <h3>📝 Transcription</h3>
        <p id="text" class="box">---</p>

        <h3>🔍 Result</h3>
        <p id="prediction" class="box">---</p>

        <div id="confidenceBox"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
